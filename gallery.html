<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <title>Food Gallery</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            margin: 0;
        }

        header {
            background-color: #2d5016;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background-color: #4a7c2a;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        .gallery {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 30px;
        }

        .gallery img {
            width: 300px;
            height: 200px;
            border-radius: 10px;
        }

        h2 {
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <header>
        <h1>My favourite Foods</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
    </nav>

    <h2>Food Gallery</h2>
    <div class="gallery">

        <img src="Biryani.webp" alt="A plate of delicious chicken Biryani" width="300" height="200">

        <img src="HotDog.jpg" alt="A tasty Hot Dog and fast food meal" width="300" height="200">

        <img src="Milkshake.jpg" alt="A delicious Milkshake in a glass" width="300" height="200">



    </div>
    <script src="script.js"></script>
</body>

</html>
